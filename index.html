<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فريق أثر - استمارة الانضمام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --error: #ff4757;
            --bg-dark: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Cairo', sans-serif;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            position: relative;
            /* ضروري لتموضع الشعار */
        }

        /* --- 1. إضافة الشعار في الخلفية --- */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* استبدل الرابط التالي برابط شعار المؤسسة */
            background-image: url('/logo.png');
            background-position: center;
            background-repeat: no-repeat;
            /* حجم الشعار (يمكنك تعديل 50% لتكبيره أو تصغيره) */
            background-size: 50%;
            /* شفافية الشعار (0.1 تعني شفاف جداً، 0.9 تعني غامق) */
            opacity: 0.15;
            z-index: -2;
            /* ليكون خلف الأنيميشن السائل */
            pointer-events: none;
            /* لضمان عدم تأثيره على النقرات */
        }

        .liquid-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: linear-gradient(45deg, var(--primary), #8e44ad);
            filter: blur(120px);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            z-index: -1;
            transform: translate(-50%, -50%);
            animation: liquid-move 20s infinite linear;
            opacity: 0.4;
        }

       

        .container {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            width: 95%;
            max-width: 550px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
            /* --- 2. إخفاء شريط التمرير (للمتصفحات الحديثة مثل فايرفوكس) --- */
            scrollbar-width: none;
        }

        /* --- 2. تابع: إخفاء شريط التمرير (لمتصفحات كروم وسفاري) --- */
        .container::-webkit-scrollbar {
            display: none;
            /* يخفي الشريط تماماً */
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 100%;
            width: 20%;
            background: var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary);
        }

        .step {
            display: none;
            animation: slideUp 0.5s ease forwards;
        }

        .step.active {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1.logo {
            font-size: 3rem;
            margin: 0;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .error-field {
            border-color: var(--error) !important;
            animation: shake 0.4s;
            background: rgba(255, 71, 87, 0.1) !important;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .dept-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }

        .dept-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 10px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
        }

        .dept-card.selected {
            background: var(--primary);
            border-color: white;
            transform: scale(1.05);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 15px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            background: var(--primary);
        }

        .btn-prev {
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>

    <div class="liquid-bg"></div>

    <div class="container" id="survey-box">
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>

        <div class="step active" id="step1">
            <h1 class="logo">مؤسســة أثــر </h1>
            <h2 style="text-align: center;">نزرع المعرفة لنترك أثراً يبقى </h2>
            <p style="text-align: center; opacity: 0.8;">انضم إلينا واصنع معنا الأثر</p>
            <button onclick="goTo(2)">ابدأ الآن</button>
        </div>

        <div class="step" id="step2">
            <h3>المعلومات الشخصية</h3>
            <input type="text" id="name" placeholder="الاسم الكامل" required autocomplete="off">
            <input type="number" id="age" placeholder="العمر" required>
            <input type="text" id="major" placeholder="الاختصاص" required>
            <input type="text" id="city" placeholder="المحافظة" required>
            <input type="tel" id="whatsapp" placeholder="رقم الواتساب" required>
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(1)">السابق</button>
                <button onclick="nextWithValidation(2, 3)">التالي</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h3>المؤهلات والخبرات</h3>
            <input type="text" id="languages" placeholder="اللغات والمستوى" required>
            <textarea id="experience" rows="3" placeholder="تحدث عن خبراتك ومواهبك..." required></textarea>
            <input type="text" id="certificates" placeholder="الشهادات العلمية" required>
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(2)">السابق</button>
                <button onclick="nextWithValidation(3, 4)">التالي</button>
            </div>
        </div>

        <div class="step" id="step4">
            <h3>تحديد المسار</h3>
            <div class="dept-grid" id="dept-grid"></div>
            <input type="hidden" id="department">
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(3)">السابق</button>
                <button onclick="validateDept()">التالي</button>
            </div>
        </div>

        <div class="step" id="step5">
            <h3>التوجه والالتزام</h3>
            <textarea id="why_join" placeholder="لماذا ترغب بالانضمام للمؤسسة؟" rows="2" required></textarea>
            <textarea id="volunteer_exp" placeholder="تجاربك السابقة في التطوع..." rows="2" required></textarea>
            <div style="margin: 10px 0; text-align: right;">
                <label>نسبة الالتزام: <span id="commit-txt">100%</span></label>
                <input type="range" id="commitment" min="0" max="100" value="100" oninput="updateRange(this.value)">
            </div>
            <select id="extra_hours" required>
                <option value="" disabled selected>ساعات إضافية؟</option>
                <option value="لا يوجد مانع">لا يوجد مانع</option>
                <option value="نعم يوجد مانع">نعم يوجد مانع</option>
                <option value="حسب الظروف">حسب الظروف</option>
            </select>
            <textarea id="strengths_weaknesses" placeholder="نقاط قوتك وضعفك" rows="2" required></textarea>
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(4)">السابق</button>
                <button id="submitBtn" onclick="submitDataWithValidation()">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <script>
        
        const API_URL = "https://sheetdb.io/api/v1/bi0e9hh6qk36x";
        const depts = [
            { id: 'media', name: 'الإعلام والسوشل ميديا' },
            { id: 'projects', name: 'إدارة المشاريع والتخطيط' },
            { id: 'psychology', name: 'الدعم النفسي' },
            { id: 'archive', name: 'قسم الأرشيف' },
            { id: 'finance', name: 'الإدارة المالية' },
            { id: 'hr', name: 'الموارد البشرية' },
            { id: 'logistics', name: 'الموارد اللوجستية' },
            { id: 'tech', name: 'التقانة وإدارة البيانات' },
            { id: 'execution', name: 'قسم التنفيذ' }
        ];        

        function renderDepts() {
            const grid = document.getElementById('dept-grid');
            grid.innerHTML = depts.map(d => `
                <div class="dept-card" onclick="selectDept(this, '${d.name}')">
                    <h4>${d.name}</h4>
                </div>
            `).join('');
        }

        function selectDept(el, name) {
            document.querySelectorAll('.dept-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('department').value = name;
        }

        function goTo(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.getElementById('p-bar').style.width = (step * 20) + "%";
        }

        function nextWithValidation(currentStep, nextStep) {
            const stepEl = document.getElementById('step' + currentStep);
            const fields = stepEl.querySelectorAll('input, textarea, select');
            let isValid = true;

            fields.forEach(f => {
                if (!f.value.trim()) {
                    f.classList.add('error-field');
                    isValid = false;
                } else {
                    f.classList.remove('error-field');
                }
            });

            if (isValid) goTo(nextStep);
        }

        function validateDept() {
            const dept = document.getElementById('department').value;
            if (!dept) alert("لطفاً، اختر القسم أولاً!");
            else goTo(5);
        }

        function updateRange(v) { document.getElementById('commit-txt').innerText = v + '%'; }

        async function submitDataWithValidation() {
            const step5 = document.getElementById('step5');
            const fields = step5.querySelectorAll('textarea, select');
            let isValid = true;

            fields.forEach(f => {
                if (!f.value.trim()) {
                    f.classList.add('error-field');
                    isValid = false;
                } else {
                    f.classList.remove('error-field');
                }
            });

            if (!isValid) return;

            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                major: document.getElementById('major').value,
                city: document.getElementById('city').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                languages: document.getElementById('languages').value,
                experience: document.getElementById('experience').value,
                certificates: document.getElementById('certificates').value,
                department: document.getElementById('department').value,
                why_join: document.getElementById('why_join').value,
                volunteer_exp: document.getElementById('volunteer_exp').value,
                commitment: document.getElementById('commitment').value + "%",
                extra_hours: document.getElementById('extra_hours').value,
                strengths_weaknesses: document.getElementById('strengths_weaknesses').value
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [data] })
                });

                document.getElementById('survey-box').innerHTML = `
                    <div class="step active" style="text-align:center;">
                        <h1 class="logo">أثــر</h1>
                        <h2 style="margin-top:20px;">شكراً لك!</h2>
                        <p>تم استلام طلبك بنجاح. سنبقى على تواصل 💜</p>
                    </div>`;
            } catch (e) {
                alert("خطأ في الإرسال، حاول مجدداً.");
                btn.disabled = false;
                btn.innerText = "إرسال الطلب";
            }
        }

        renderDepts();
    </script>
</body>


</html>
