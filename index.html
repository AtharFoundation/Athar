    <!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta proerty="og:title" content="قريق أثر - استبيان انضمام" />
    <meta proerty="og:description" content="استبيان انضمام الأعضاء الجدد الخ الخ اقترحولي شي شغلة حطا هون" />
    <meta proerty="og:image" content="logo.png" />
    <meta proerty="og:type" content="website" />
    <title>فريق أثر - استمارة الانضمام</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --error: #ff4757;
            --bg-dark: #0a0a12;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
            width: 100%;
            overflow-x: hidden;
            padding: 20px 10px;
        }

        /* --- الخلفية والشعار --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('logo.png');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0.1;
            z-index: -2;
            pointer-events: none;
        }

        .liquid-bg {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, var(--primary), #8e44ad);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            transform: translate(-50%, -50%);
            opacity: 0.3;
            pointer-events: none;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            width: 100%;
            max-width: 500px;
            padding: 30px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            max-height: 90vh;
            overflow-y: auto;
            scrollbar-width: none;
            position: relative;
        }

        .container::-webkit-scrollbar {
            display: none;
        }

        .progress-container {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            width: 20%;
            background: var(--primary);
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        .step {
            display: none;
            animation: slideUp 0.4s ease-out forwards;
        }

        .step.active {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1.logo {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        h2 { font-size: 1.2rem; margin-bottom: 5px; }
        h3 { font-size: 1.1rem; margin-bottom: 15px; border-right: 4px solid var(--primary); padding-right: 10px; }

        input, textarea, select {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            font-size: 16px; /* منع الـ Zoom التلقائي في آيفون */
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .dept-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .dept-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 12px 5px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
        }

        .dept-card h4 { margin: 0; font-size: 0.85rem; font-weight: 400; }

        .dept-card.selected {
            background: var(--primary);
            border-color: white;
            transform: scale(0.98);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            background: var(--primary);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        button:active { transform: scale(0.95); }

        .btn-prev {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .error-field {
            border-color: var(--error) !important;
            background: rgba(255, 71, 87, 0.1) !important;
        }

        /* تعديلات الموبايل */
        @media (max-width: 400px) {
            .dept-grid { grid-template-columns: 1fr; }
            h1 { font-size: 1.8rem; }
            .container { padding: 20px 15px; }
        }
    </style>
</head>

<body>

    <div class="liquid-bg"></div>

    <div class="container" id="survey-box">
        <div class="progress-container">
            <div class="progress-bar" id="p-bar"></div>
        </div>

        <div class="step active" id="step1">
            <h1 class="logo">فريـق أثــر </h1>
            <h2 style="text-align: center;">نزرع المعرفة لنترك أثراً يبقى </h2>
            <p style="text-align: center; opacity: 0.8; font-size: 0.9rem;">نؤمن بقدرات الشباب و نسعى لتعزيز الشغف و غرس الامل بمستقبل مشرق نصنعه اليوم لنعيشه سويا غدا </p>
             <p style="text-align: center; opacity: 0.8; font-size: 0.9rem;">انضم إلينا واترك اثرك الإبداعي🔥 </p>
            <button onclick="goTo(2)">ابدأ الآن</button>
        </div>

        <div class="step" id="step2">
            <h3>المعلومات الشخصية</h3>
            <input type="text" id="name" placeholder="الاسم الكامل" required autocomplete="off">
            <input type="number" id="age" placeholder="العمر" required>
            <input type="text" id="major" placeholder="الاختصاص" required>
            <input type="text" id="city" placeholder="المحافظة" required>
            <input type="tel" id="whatsapp" placeholder="رقم الواتساب" required dir="rtl">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required>
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(1)">السابق</button>
                <button onclick="nextWithValidation(2, 3)">التالي</button>
            </div>
        </div>

        <div class="step" id="step3">
            <h3>المؤهلات والخبرات</h3>
            <input type="text" id="languages" placeholder="اللغات والمستوى" required>
            <textarea id="experience" rows="3" placeholder="تحدث عن خبراتك ومواهبك..." required></textarea>
            <input type="text" id="certificates" placeholder="الشهادات العلمية" required>
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(2)">السابق</button>
                <button onclick="nextWithValidation(3, 4)">التالي</button>
            </div>
        </div>

        <div class="step" id="step4">
            <h3>تحديد المسار</h3>
            <div class="dept-grid" id="dept-grid"></div>
            <input type="hidden" id="department">
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(3)">السابق</button>
                <button onclick="validateDept()">التالي</button>
            </div>
        </div>

        <div class="step" id="step5">
            <h3>التوجه والالتزام</h3>
            <textarea id="why_join" placeholder="لماذا ترغب بالانضمام للفريق؟" rows="2" required></textarea>
            <textarea id="volunteer_exp" placeholder="تجاربك السابقة في التطوع..." rows="2" required></textarea>
            <div style="margin: 10px 0; text-align: right; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px;">
                <label style="font-size: 0.9rem;">نسبة الالتزام: <span id="commit-txt" style="color: var(--secondary); font-weight: bold;">100%</span></label>
                <input type="range" id="commitment" min="0" max="100" value="100" oninput="updateRange(this.value)" style="margin: 10px 0 0 0;">
            </div>
            <select id="extra_hours" required>
                <option value="" disabled selected>ساعات إضافية؟</option>
                <option value="لا يوجد مانع">لا يوجد مانع</option>
                <option value="نعم يوجد مانع">نعم يوجد مانع</option>
                <option value="حسب الظروف">حسب الظروف</option>
            </select>
            <textarea id="strengths_weaknesses" placeholder="نقاط قوتك وضعفك" rows="2" required></textarea>
            <div class="btn-row">
                <button class="btn-prev" onclick="goTo(4)">السابق</button>
                <button id="submitBtn" onclick="submitDataWithValidation()">إرسال الطلب</button>
            </div>
        </div>
    </div>

    <script>
        // الكود المصدري للجافا سكريبت كما هو تماماً دون أي تعديل في المنطق
        const API_URL = "https://sheetdb.io/api/v1/bi0e9hh6qk36x";
        const depts = [
            { id: 'media', name: 'الإعلام والسوشل ميديا' },
            { id: 'projects', name: 'إدارة المشاريع والتخطيط' },
            { id: 'psychology', name: 'الدعم النفسي' },
            { id: 'archive', name: 'قسم الأرشيف' },
            { id: 'finance', name: 'الإدارة المالية' },
            { id: 'hr', name: 'الموارد البشرية' },
            { id: 'logistics', name: 'الموارد اللوجستية' },
            { id: 'tech', name: 'التقانة وإدارة البيانات' },
            { id: 'execution', name: 'قسم التنفيذ' }
        ];

        function renderDepts() {
            const grid = document.getElementById('dept-grid');
            grid.innerHTML = depts.map(d => `
                <div class="dept-card" onclick="selectDept(this, '${d.name}')">
                    <h4>${d.name}</h4>
                </div>
            `).join('');
        }

        function selectDept(el, name) {
            document.querySelectorAll('.dept-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            document.getElementById('department').value = name;
        }

        function goTo(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            document.getElementById('p-bar').style.width = (step * 20) + "%";
            document.getElementById('survey-box').scrollTop = 0; // العودة للأعلى عند الانتقال
        }

        function nextWithValidation(currentStep, nextStep) {
            const stepEl = document.getElementById('step' + currentStep);
            const fields = stepEl.querySelectorAll('input, textarea, select');
            let isValid = true;

            fields.forEach(f => {
                if (!f.value.trim()) {
                    f.classList.add('error-field');
                    isValid = false;
                } else {
                    f.classList.remove('error-field');
                }
            });

            if (isValid) goTo(nextStep);
        }

        function validateDept() {
            const dept = document.getElementById('department').value;
            if (!dept) alert("لطفاً، اختر القسم أولاً!");
            else goTo(5);
        }

        function updateRange(v) { document.getElementById('commit-txt').innerText = v + '%'; }

        async function submitDataWithValidation() {
            const step5 = document.getElementById('step5');
            const fields = step5.querySelectorAll('textarea, select');
            let isValid = true;

            fields.forEach(f => {
                if (!f.value.trim()) {
                    f.classList.add('error-field');
                    isValid = false;
                } else {
                    f.classList.remove('error-field');
                }
            });

            if (!isValid) return;

            const btn = document.getElementById('submitBtn');
            btn.innerText = "جاري الإرسال...";
            btn.disabled = true;

            const data = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                major: document.getElementById('major').value,
                city: document.getElementById('city').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                languages: document.getElementById('languages').value,
                experience: document.getElementById('experience').value,
                certificates: document.getElementById('certificates').value,
                department: document.getElementById('department').value,
                why_join: document.getElementById('why_join').value,
                volunteer_exp: document.getElementById('volunteer_exp').value,
                commitment: document.getElementById('commitment').value + "%",
                extra_hours: document.getElementById('extra_hours').value,
                strengths_weaknesses: document.getElementById('strengths_weaknesses').value
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: [data] })
                });

                document.getElementById('survey-box').innerHTML = `
                    <div class="step active" style="text-align:center; padding: 40px 0;">
                        <h1 class="logo">أثــر</h1>
                        <h2 style="margin-top:20px;">شكراً لك!</h2>
                        <p>تم استلام طلبك بنجاح. سنبقى على تواصل 💜</p>
                    </div>`;
            } catch (e) {
                alert("خطأ في الإرسال، حاول مجدداً.");
                btn.disabled = false;
                btn.innerText = "إرسال الطلب";
            }
        }

        renderDepts();
    </script>
</body>
</html>
